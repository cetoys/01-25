version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kalorisayar
      POSTGRES_USER: kalorisayar
      POSTGRES_PASSWORD: kalorisayar
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopass
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio:/data
  posthog:
    image: posthog/posthog:latest
    environment:
      DATABASE_URL: postgres://kalorisayar:kalorisayar@postgres:5432/kalorisayar
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - '8000:8000'
volumes:
  pgdata:
  minio:
